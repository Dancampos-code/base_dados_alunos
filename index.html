<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curiosidades de Iguape - SP</title>
  
  <style>
    /* --- CSS RESET & VARIABLES --- */
    :root {
      --primary: #1a4d2e;
      --primary-light: #2d6a4f;
      --accent: #d4a373;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #2b2d42;
      --text-muted: #6c757d;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --transition: all 0.3s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* --- HERO SECTION --- */
    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      padding: 4rem 1.5rem 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto 1.5rem;
    }

    /* --- FILTER BAR --- */
    .filter-container {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
      transition: var(--transition);
    }

    .filter-btn:hover, .filter-btn.active {
      background: white;
      color: var(--primary);
    }

    /* --- MAIN CONTAINER & CARDS GRID --- */
    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      border-top: 4px solid var(--primary);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    .card .tag {
      align-self: flex-start;
      background: #e8f5e9;
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.8rem;
    }

    .card h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      flex-grow: 1;
    }

    .like-btn {
      margin-top: 1rem;
      background: transparent;
      border: 1px solid #e0e0e0;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: var(--transition);
      width: fit-content;
    }

    .like-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* --- FOOTER --- */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid #e0e0e0;
      margin-top: 3rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Iguape - SP</h1>
    <p>Descubra fatos históricos, geográficos e culturais sobre uma das cidades mais antigas do Brasil.</p>

    <!-- Filtros em JS -->
    <div class="filter-container">
      <button class="filter-btn active" onclick="filterCards('all', this)">Todas</button>
      <button class="filter-btn" onclick="filterCards('historia', this)">História</button>
      <button class="filter-btn" onclick="filterCards('geografia', this)">Geografia</button>
      <button class="filter-btn" onclick="filterCards('cultura', this)">Cultura</button>
    </div>
  </header>

  <main>
    <div class="grid" id="curiosidades-grid">
      <!-- O JS preencherá os cards dinamicamente -->
    </div>
  </main>

  <footer>
    <p>Desenvolvido com Vanilla HTML, CSS e JS | Iguape/SP</p>
  </footer>

  <script>
    // --- DATA ARRAY ---
    const curiosidades = [
      {
        id: 1,
        categoria: 'historia',
        titulo: 'Fundação Antiga',
        descricao: 'Fundada em 1538, Iguape é um dos municípios mais antigos do Brasil, rivalizando com São Vicente nas primeiras povoações da era colonial.'
      },
      {
        id: 2,
        categoria: 'historia',
        titulo: 'O Ciclo do Ouro',
        descricao: 'Antes de Minas Gerais, a região de Iguape foi um dos primeiros locais de extração de ouro de aluvião do país, abrigando a primeira Casa de Fundição do Brasil.'
      },
      {
        id: 3,
        categoria: 'geografia',
        titulo: 'Maior Município de SP',
        descricao: 'Em extensão territorial, Iguape é o maior município do Estado de São Paulo, cobrindo cerca de 1.975 km².'
      },
      {
        id: 4,
        categoria: 'geografia',
        titulo: 'O Valo Grande',
        descricao: 'No século XIX, foi aberto um canal artificial (Valo Grande) para desviar o Rio Ribeira de Iguape direto para a baía, o que alterou significativamente o ecossistema local.'
      },
      {
        id: 5,
        categoria: 'cultura',
        titulo: 'Festa do Bom Jesus',
        descricao: 'A Festa do Senhor Bom Jesus de Iguape é uma das maiores manifestações religiosas do estado, atraindo centenas de milhares de romeiros todos os anos no mês de agosto.'
      },
      {
        id: 6,
        categoria: 'cultura',
        titulo: 'Patrimônio Tombado',
        descricao: 'O Centro Histórico de Iguape possui um vasto acervo de casarões coloniais preservados, sendo tombado pelo IPHAN desde 2009.'
      }
    ];

    // --- RENDER FUNCTION ---
    function renderCards(items) {
      const grid = document.getElementById('curiosidades-grid');
      grid.innerHTML = '';

      items.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <span class="tag">${item.categoria}</span>
          <h3>${item.titulo}</h3>
          <p>${item.descricao}</p>
          <button class="like-btn" onclick="likeCard(this)">
            ❤️ <span class="like-count">0</span>
          </button>
        `;
        grid.appendChild(card);
      });
    }

    // --- FILTER LOGIC ---
    function filterCards(categoria, btn) {
      // Atualiza estado visual dos botões
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Aplica o filtro no Array
      if (categoria === 'all') {
        renderCards(curiosidades);
      } else {
        const filtered = curiosidades.filter(c => c.categoria === categoria);
        renderCards(filtered);
      }
    }

    // --- INTERACTION LOGIC ---
    function likeCard(btn) {
      const countSpan = btn.querySelector('.like-count');
      let currentLikes = parseInt(countSpan.textContent);
      countSpan.textContent = currentLikes + 1;
    }

    // --- INITIAL RENDER ---
    document.addEventListener('DOMContentLoaded', () => {
      renderCards(curiosidades);
    });
  </script>
</body>
</html>
